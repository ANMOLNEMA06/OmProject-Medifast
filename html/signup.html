<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Medifast</title>
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/signup.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo-section">
            <div class="logo-icon">+</div>
            <div class="logo">Medifast</div>
        </div>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#features">Services</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="login.html" class="login-link">Sign In</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="signup-container">
            <div class="signup-box">
                <h1>Create Account</h1>
                <p class="subtitle">Join Medifast for better healthcare</p>

                <form id="signupForm" class="signup-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstName">First Name</label>
                            <input type="text" id="firstName" name="firstName" placeholder="First name" required>
                        </div>
                        <div class="form-group">
                            <label for="lastName">Last Name</label>
                            <input type="text" id="lastName" name="lastName" placeholder="Last name" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="signupEmail">Email Address</label>
                        <input type="email" id="signupEmail" name="signupEmail" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
                    </div>

                    <div class="form-group">
                        <label for="signupPassword">Password</label>
                        <input type="password" id="signupPassword" name="signupPassword" placeholder="Create a strong password" required>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required>
                    </div>

                    <div class="password-requirements">
                        <p>Password must contain:</p>
                        <ul>
                            <li><span class="requirement" id="req-length">✓</span> At least 8 characters</li>
                            <li><span class="requirement" id="req-uppercase">✓</span> One uppercase letter</li>
                            <li><span class="requirement" id="req-lowercase">✓</span> One lowercase letter</li>
                            <li><span class="requirement" id="req-number">✓</span> One number</li>
                        </ul>
                    </div>

                    <label class="terms">
                        <input type="checkbox" id="agreeTerms" name="agreeTerms" required>
                        I agree to the <a href="#">Terms & Conditions</a> and <a href="#">Privacy Policy</a>
                    </label>

                    <button type="submit" class="signup-submit-btn">Create Account</button>
                </form>

                <div class="divider">OR</div>

                <button class="social-btn google-btn" id="googleSignup">
                    <span>Sign up with Google</span>
                </button>

                <p class="login-text">
                    Already have an account? <a href="login.html">Sign in here</a>
                </p>
            </div>
        </div>
    </main>

    <script src="../js/signup.js"></script>
</body>
</html>
